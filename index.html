<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#07090F" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#FDF8F4" media="(prefers-color-scheme: light)">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Alif — Arabic Learning App</title>
<link rel="stylesheet" href="styles/design.css">
<link rel="manifest" href="manifest.json">
</head>
<body>
<div id="app">

  <!-- ── LEFT SIDEBAR (desktop only) ── -->
  <div id="app-sidebar-left">

    <!-- Logo -->
    <div class="logo-circle" style="width:88px; height:88px; margin-bottom:16px; animation: logoFloat 4s ease-in-out infinite, goldPulse 4s ease-in-out infinite; flex-shrink:0;">
      <img id="logo-left" src="assets/images/Alif-Light.png" alt="Alif" style="width:100%;height:100%;object-fit:cover;">
    </div>
    <div style="font-family:'Cormorant Garamond',serif; font-size:26px; color:var(--crimson); margin-bottom:2px;">Alif</div>
    <div style="font-family:'Amiri',serif; font-size:18px; direction:rtl; color:var(--gold); margin-bottom:12px;">أَلِف</div>
    <p id="sidebar-tagline" style="font-size:12px; color:var(--text-muted); font-style:italic; line-height:1.7; max-width:160px; margin:0 auto;">
      Arabic is the door, and Alif is the first step.
    </p>

    <!-- Desktop nav -->
    <div id="sidebar-nav">
      <button class="sidebar-nav-item active" id="snav-home" onclick="showScreen('home')">
        <span class="sidebar-nav-icon">🏠</span> Home
      </button>
      <button class="sidebar-nav-item" id="snav-track" onclick="showScreen('track')">
        <span class="sidebar-nav-icon">📚</span> My Track
      </button>
      <button class="sidebar-nav-item" id="snav-journal" onclick="showScreen('journal')">
        <span class="sidebar-nav-icon">📓</span> Journal
      </button>
    </div>

    <!-- Bottom of left sidebar -->
    <div style="margin-top:auto; padding-top:20px; border-top:1px solid var(--border); width:100%; text-align:center;">
      <div style="font-family:'Amiri',serif; font-size:14px; direction:rtl; color:var(--text-arabic); margin-bottom:4px; line-height:1.9;">وَمَا تَوْفِيقِي إِلَّا بِاللَّهِ</div>
      <div style="font-size:10px; color:var(--text-muted); font-style:italic; line-height:1.5;">Success is only through Allah.</div>
    </div>
  </div>

  <!-- ── CENTER (the app) ── -->
  <div id="app-main">
    <!-- Loading state -->
    <div style="display:flex; align-items:center; justify-content:center; min-height:100vh; flex-direction:column; gap:16px;">
      <div class="logo-circle" style="width:80px; height:80px; animation: goldPulse 1.5s ease-in-out infinite;">
        <img id="logo-loading" src="assets/images/Alif-Light.png" alt="Alif" style="width:100%;height:100%;object-fit:cover;">
      </div>
      <div style="font-family:'DM Sans',sans-serif; font-size:14px; color:var(--text-muted);">Loading…</div>
    </div>
  </div>

  <!-- ── RIGHT SIDEBAR (desktop only) ── -->
  <div id="app-sidebar-right">

    <!-- User greeting -->
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:24px; padding-bottom:20px; border-bottom:1px solid var(--border);">
      <div style="width:36px; height:36px; border-radius:50%; background:var(--accent-bg); border:1px solid var(--border-gold); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0;">🕌</div>
      <div>
        <div id="sidebar-username" style="font-size:14px; font-weight:600; color:var(--text-primary);">—</div>
        <div style="font-size:11px; color:var(--text-muted);">Student</div>
      </div>
    </div>

    <!-- Progress label -->
    <div style="font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-muted); margin-bottom:12px;">Your Progress</div>

    <!-- Stats -->
    <div style="display:flex; flex-direction:column; gap:8px; margin-bottom:auto;">
      <div style="background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:14px 16px; display:flex; align-items:center; gap:12px;">
        <span style="font-size:20px;">🔥</span>
        <div>
          <div id="stat-streak" style="font-family:'Cormorant Garamond',serif; font-size:24px; font-weight:600; color:var(--crimson); line-height:1;">0</div>
          <div style="font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.06em; margin-top:1px;">Day Streak</div>
        </div>
      </div>
      <div style="background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:14px 16px; display:flex; align-items:center; gap:12px;">
        <span style="font-size:20px; color:var(--gold);">✦</span>
        <div>
          <div id="stat-xp" style="font-family:'Cormorant Garamond',serif; font-size:24px; font-weight:600; color:var(--crimson); line-height:1;">0</div>
          <div style="font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.06em; margin-top:1px;">XP Earned</div>
        </div>
      </div>
      <div style="background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:14px 16px; display:flex; align-items:center; gap:12px;">
        <span style="font-size:20px;">📖</span>
        <div>
          <div id="stat-lessons" style="font-family:'Cormorant Garamond',serif; font-size:24px; font-weight:600; color:var(--crimson); line-height:1;">0</div>
          <div style="font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.06em; margin-top:1px;">Lessons Done</div>
        </div>
      </div>
    </div>

    <!-- Bottom actions -->
    <div style="padding-top:20px; border-top:1px solid var(--border); margin-top:24px; display:flex; flex-direction:column; gap:8px;">
      <button id="sidebar-theme-btn" class="theme-toggle" style="width:100%; justify-content:center;" onclick="cycleTheme()">
        <span class="theme-toggle-icon">☀️</span>
        <span>Light</span>
      </button>
      <button style="width:100%; background:none; border:1px solid var(--border); border-radius:10px; padding:10px 14px; font-family:var(--font-body); font-size:13px; color:var(--text-muted); cursor:pointer; transition:all 0.15s; display:flex; align-items:center; gap:8px; justify-content:center;"
        onclick="showProfile()"
        onmouseover="this.style.borderColor='var(--border-strong)'; this.style.color='var(--text-primary)'"
        onmouseout="this.style.borderColor='var(--border)'; this.style.color='var(--text-muted)'">
        👤 <span>Profile & Settings</span>
      </button>
    </div>

  </div><!-- end right sidebar -->

</div><!-- end #app -->

<script type="module" src="app.js"></script>
</body>
</html>
